function countNodes(n){let c=1;if(n.children)n.children.forEach(ch=>c+=countNodes(ch));return c}
function collectIE(n,s=new Set()){if(n.ie)s.add(n.ie);if(n.children)n.children.forEach(c=>collectIE(c,s));return s}

function hasMatch(n,f){
  if(f.ie!=="전체"&&n.ie===f.ie)return true;
  if(n.children)return n.children.some(c=>hasMatch(c,f));
  return false;
}

function filterTree(node,filter){
  if(filter.scope==="전체"&&filter.ie==="전체")return node;
  function prune(n){
    if(!n.children){
      const sOk=filter.scope==="전체"||!n.scope||n.scope===filter.scope||n.scope==="공통";
      const iOk=filter.ie==="전체"||n.ie===filter.ie;
      return(filter.ie!=="전체"?sOk&&iOk:sOk)?{...n}:null;
    }
    const fc=n.children.map(prune).filter(Boolean);
    if(fc.length>0)return{...n,children:fc};
    const sOk=filter.scope==="전체"||!n.scope||n.scope===filter.scope||n.scope==="공통";
    const iOk=filter.ie==="전체"||hasMatch(n,filter);
    return(sOk&&iOk)?{...n,children:undefined}:null;
  }
  return prune(node)||node;
}

function TreeNode({node,depth=0,parentColor,expanded,toggleExpand,selectedNode,setSelectedNode}){
  const theme=useContext(ThemeCtx);
  const T=THEMES[theme];
  const color=node.color||parentColor||"#64748B";
  const hasChildren=node.children&&node.children.length>0;
  const isExpanded=expanded.has(node.id);
  const isSelected=selectedNode===node.id;
  const isLeaf=!hasChildren;
  const depthIndent=depth*20;
  const ieTags=[...collectIE(node)];

  const levelConf=[
    {fs:16,fw:800,py:14,bg:T.cardBg,bw:2},
    {fs:14,fw:700,py:10,bg:T.cardBg2,bw:2},
    {fs:13,fw:600,py:8,bg:T.cardBg3,bw:1},
    {fs:12,fw:500,py:6,bg:"transparent",bw:1},
  ];
  const s=levelConf[Math.min(depth,3)];

  const handleClick=useCallback(()=>{
    if(hasChildren)toggleExpand(node.id);
    else setSelectedNode(isSelected?null:node.id);
  },[node.id,hasChildren,isSelected,toggleExpand,setSelectedNode]);

  const borderColor=`${color}${depth===0?'':'88'}`;

  return(
    <div style={{marginLeft:depthIndent}}>
      <div onClick={handleClick}
        style={{
          display:"flex",alignItems:"flex-start",gap:8,padding:`${s.py}px 12px`,
          marginBottom:2,borderRadius:8,background:s.bg,
          border:`${s.bw}px solid ${color}${depth<=1?'88':'33'}`,
          cursor:"pointer",transition:"all .15s ease",
          boxShadow:isSelected?`0 0 0 2px ${color}`:"none",
        }}
        onMouseEnter={e=>{e.currentTarget.style.background=T.surfaceHover}}
        onMouseLeave={e=>{e.currentTarget.style.background=s.bg}}
      >
        <span style={{width:18,minWidth:18,fontSize:13,color,marginTop:2,fontFamily:"'JetBrains Mono',monospace",userSelect:"none"}}>
          {hasChildren?(isExpanded?"▼":"▶"):"●"}
        </span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            {depth>0&&<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color,fontWeight:700,minWidth:36}}>{node.id}</span>}
            <span style={{fontSize:s.fs,fontWeight:s.fw,color:T.text,lineHeight:1.4}}>{node.label}</span>
            <span style={{fontSize:10,color:T.textTer,fontWeight:400}}>{node.level}</span>
            {node.scope&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:4,background:`${SCOPE_COLORS_MAP[node.scope]}22`,color:SCOPE_COLORS_MAP[node.scope],fontWeight:600,border:`1px solid ${SCOPE_COLORS_MAP[node.scope]}44`}}>{node.scope}</span>}
            {depth<=1&&ieTags.length>0&&ieTags.map(t=><span key={t} style={{fontSize:9,padding:"1px 6px",borderRadius:4,background:`${IE_COLORS_MAP[t]}22`,color:IE_COLORS_MAP[t],fontWeight:600,border:`1px solid ${IE_COLORS_MAP[t]}44`}}>{IE_LABELS[t]}</span>)}
            {node.ie&&depth>1&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:4,background:`${IE_COLORS_MAP[node.ie]}22`,color:IE_COLORS_MAP[node.ie],fontWeight:600,border:`1px solid ${IE_COLORS_MAP[node.ie]}44`}}>{IE_LABELS[node.ie]}</span>}
          </div>
          {depth<=1&&node.sublabel&&<div style={{fontSize:11,color:T.textSec,marginTop:3,lineHeight:1.5}}>{node.sublabel}</div>}
          {hasChildren&&!isExpanded&&<div style={{fontSize:10,color:T.textTer,marginTop:2}}>하위 {countNodes(node)-1}개 노드</div>}
        </div>
      </div>
      {isLeaf&&isSelected&&(
        <div style={{marginLeft:26,marginBottom:6,padding:"10px 14px",borderRadius:8,background:T.detailBg(color),borderLeft:`3px solid ${color}66`}}>
          {node.desc&&<div style={{fontSize:12,color:T.text,lineHeight:1.6,marginBottom:6}}>{node.desc}</div>}
          {node.spec&&<div style={{fontSize:11,color:"#F59E0B",marginBottom:4}}>📐 {node.spec}</div>}
          {node.src&&<div style={{fontSize:10,color:T.textTer}}>출처: {node.src}</div>}
        </div>
      )}
      {hasChildren&&isExpanded&&(
        <div style={{marginTop:2,marginBottom:depth===0?8:2}}>
          {node.children.map(child=><TreeNode key={child.id} node={child} depth={depth+1} parentColor={color} expanded={expanded} toggleExpand={toggleExpand} selectedNode={selectedNode} setSelectedNode={setSelectedNode}/>)}
        </div>
      )}
    </div>
  );
}

function Stats({data}){
  const theme=useContext(ThemeCtx);
  const T=THEMES[theme];
  let counts={total:0,bf:0,s2:0,s3:0};
  function walk(n){counts.total++;if(n.level?.startsWith("기본기능"))counts.bf++;else if(n.level==="2차")counts.s2++;else if(n.level==="3차")counts.s3++;if(n.children)n.children.forEach(walk)}
  walk(data);
  const items=[{l:"총 노드",v:counts.total,c:T.text},{l:"기본기능",v:counts.bf,c:"#60A5FA"},{l:"2차 세부",v:counts.s2,c:"#A78BFA"},{l:"3차 핵심",v:counts.s3,c:"#34D399"}];
  return(<div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:16}}>
    {items.map(it=><div key={it.l} style={{display:"flex",alignItems:"baseline",gap:6}}>
      <span style={{fontSize:22,fontWeight:800,color:it.c,fontFamily:"'JetBrains Mono',monospace"}}>{it.v}</span>
      <span style={{fontSize:11,color:T.textSec}}>{it.l}</span>
    </div>)}
  </div>);
}

function App(){
  const[theme,setTheme]=useState("dark");
  const[expanded,setExpanded]=useState(new Set(["root"]));
  const[selectedNode,setSelectedNode]=useState(null);
  const[filter,setFilter]=useState({scope:"전체",ie:"전체"});

  const T=THEMES[theme];

  const toggleTheme=useCallback(()=>{
    const next=theme==="dark"?"light":"dark";
    setTheme(next);
    document.body.className=next;
  },[theme]);

  const toggleExpand=useCallback(id=>{
    setExpanded(prev=>{const next=new Set(prev);if(next.has(id))next.delete(id);else next.add(id);return next});
  },[]);

  const expandAll=useCallback(()=>{
    const ids=new Set();function walk(n){ids.add(n.id);if(n.children)n.children.forEach(walk)}walk(TREE_DATA);setExpanded(ids);
  },[]);
  const collapseAll=useCallback(()=>{setExpanded(new Set(["root"]));setSelectedNode(null)},[]);
  const expandLevel=useCallback(d=>{
    const ids=new Set();function walk(n,dd){if(dd<=d)ids.add(n.id);if(n.children)n.children.forEach(c=>walk(c,dd+1))}walk(TREE_DATA,0);setExpanded(ids);
  },[]);

  const filteredData=useMemo(()=>filterTree(TREE_DATA,filter),[filter]);

  const scopes=["전체","공통","실내","실외"];
  const ies=["전체","OR","MFG","HF"];

  const btnStyle=(active,ac)=>({
    fontSize:11,padding:"4px 12px",borderRadius:6,cursor:"pointer",
    border:active?`1px solid ${ac||"#60A5FA"}`:`1px solid ${theme==="dark"?"#334155":"#CBD5E1"}`,
    background:active?`${ac||"#60A5FA"}22`:"transparent",
    color:active?(ac||"#60A5FA"):T.textSec,fontWeight:active?600:400,
  });

  return(
    <ThemeCtx.Provider value={theme}>
      <div style={{minHeight:"100vh",background:T.bg,color:T.text,transition:"all .3s ease"}}>
        <div style={{maxWidth:920,margin:"0 auto",padding:"24px 16px"}}>
          {/* Header */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                <div style={{width:4,height:28,background:"linear-gradient(180deg,#2563EB,#7C3AED)",borderRadius:2}}/>
                <h1 style={{fontSize:20,fontWeight:800,margin:0,letterSpacing:"-0.02em"}}>GAEMI 플랫폼 기술트리</h1>
              </div>
              <div style={{fontSize:12,color:T.textTer,marginLeft:14,lineHeight:1.6}}>
                ROBOTIS GAEMI 자율주행 배송 로봇 — 목적기능 → 기본기능 → 세부기능 → 핵심기술 (Top-Down 기능 분해)
              </div>
              <div style={{fontSize:10,color:T.textQuat,marginLeft:14,marginTop:4}}>
                한양대학교 ERICA 기술경영 | Lecture 3 기술기획 기반 | 4단계 구조
              </div>
            </div>
            <button onClick={toggleTheme} style={{
              fontSize:12,padding:"6px 14px",borderRadius:8,cursor:"pointer",
              border:`1px solid ${theme==="dark"?"#334155":"#CBD5E1"}`,
              background:theme==="dark"?"#1E293B":"#FFFFFF",
              color:T.textSec,fontWeight:600,whiteSpace:"nowrap",
            }}>
              {theme==="dark"?"☀️ Light":"🌙 Dark"}
            </button>
          </div>

          <Stats data={TREE_DATA}/>

          {/* Legend */}
          <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:12}}>
            <div style={{fontSize:10,color:T.textTer,fontWeight:700,marginRight:4}}>범위:</div>
            {Object.entries(SCOPE_COLORS_MAP).map(([k,v])=><div key={k} style={{display:"flex",alignItems:"center",gap:4}}>
              <span style={{width:8,height:8,borderRadius:2,background:v,display:"inline-block"}}/>
              <span style={{fontSize:10,color:T.textSec}}>{k}</span>
            </div>)}
            <div style={{width:1,background:theme==="dark"?"#334155":"#E2E8F0",margin:"0 4px"}}/>
            <div style={{fontSize:10,color:T.textTer,fontWeight:700,marginRight:4}}>산업공학:</div>
            {Object.entries(IE_LABELS).map(([k,v])=><div key={k} style={{display:"flex",alignItems:"center",gap:4}}>
              <span style={{width:8,height:8,borderRadius:2,background:IE_COLORS_MAP[k],display:"inline-block"}}/>
              <span style={{fontSize:10,color:T.textSec}}>{v}</span>
            </div>)}
          </div>

          {/* Controls */}
          <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
            {[["전체 펼치기",expandAll],["전체 접기",collapseAll],["기본기능까지",()=>expandLevel(1)],["2차까지",()=>expandLevel(2)],["3차까지",()=>expandLevel(3)]].map(([l,fn])=>
              <button key={l} onClick={fn} style={btnStyle(false)}>{l}</button>
            )}
          </div>

          {/* Filters */}
          <div style={{display:"flex",gap:20,flexWrap:"wrap",marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:11,color:T.textTer,fontWeight:600}}>범위:</span>
              {scopes.map(s=><button key={s} onClick={()=>setFilter(f=>({...f,scope:s}))} style={btnStyle(filter.scope===s)}>{s}</button>)}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:11,color:T.textTer,fontWeight:600}}>산업공학:</span>
              {ies.map(t=><button key={t} onClick={()=>setFilter(f=>({...f,ie:t}))} style={btnStyle(filter.ie===t,IE_COLORS_MAP[t])}>{t==="전체"?"전체":IE_LABELS[t]}</button>)}
            </div>
          </div>

          {/* Tree */}
          <div style={{background:theme==="dark"?"#1E293B22":"#FFFFFF",borderRadius:12,padding:"12px 8px",border:`1px solid ${theme==="dark"?"#1E293B":"#E2E8F0"}`}}>
            <TreeNode node={filteredData} depth={0} expanded={expanded} toggleExpand={toggleExpand} selectedNode={selectedNode} setSelectedNode={setSelectedNode}/>
          </div>

          {/* Footer */}
          <div style={{marginTop:16,padding:"12px 14px",background:theme==="dark"?"#1E293B44":"#F1F5F9",borderRadius:8,border:`1px solid ${theme==="dark"?"#1E293B":"#E2E8F0"}`}}>
            <div style={{fontSize:11,color:T.textTer,lineHeight:1.6}}>
              <strong style={{color:T.textSec}}>조작 안내</strong> — ▶ 클릭: 하위 노드 펼치기/접기 | ● 클릭: 3차 핵심기술 상세 정보 보기 | 상단 버튼: 펼침 수준 제어 및 필터링
            </div>
            <div style={{fontSize:10,color:T.textQuat,marginTop:6}}>
              출처: ROBOTIS 공식(robotis.com, robotis.us, en.robotis.com), 산업통상자원부 고시 제2023-211호 별표3, HITEC 2024 기자취재, aparobot.com, iF Design Award 2024
            </div>
          </div>
        </div>
      </div>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
