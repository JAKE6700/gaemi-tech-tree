function StatusBadge({status}){
  const s=STATUS_STYLE[status]||STATUS_STYLE["전망"];
  return <span style={{fontSize:9,padding:"1px 6px",borderRadius:4,background:s.bg,color:s.color,border:`1px solid ${s.border}`,fontWeight:600}}>{status}</span>;
}

function MarketLayer({data}){
  const theme=useContext(ThemeCtx);const T=TH[theme];
  const[openPeriod,setOpen]=useState(0);
  return(
    <div>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        {PERIOD_LABELS.map((p,i)=>(
          <button key={i} onClick={()=>setOpen(i)} style={{flex:1,padding:"8px 6px",borderRadius:8,cursor:"pointer",
            border:openPeriod===i?`2px solid ${PERIOD_COLORS[i]}`:`1px solid ${T.border}`,
            background:openPeriod===i?PERIOD_COLORS[i]+"18":"transparent",
            color:openPeriod===i?PERIOD_COLORS[i]:T.t2,fontWeight:openPeriod===i?700:400,fontSize:12,textAlign:"center",
          }}>
            <div>{p}</div>
            <div style={{fontSize:10,fontWeight:400,marginTop:2,opacity:.7}}>{PERIOD_SUB[i]}</div>
          </button>
        ))}
      </div>
      {data.filter(d=>d.period===openPeriod).map((d,di)=>(
        <div key={di}>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {d.items.map((it,ii)=>(
              <div key={ii} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"6px 10px",borderRadius:6,background:T.rowBg,border:`1px solid ${T.border}`}}>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:PERIOD_COLORS[openPeriod],fontWeight:700,minWidth:52,marginTop:1}}>{it.year}</span>
                <span style={{fontSize:12,color:T.text,flex:1,lineHeight:1.5}}>{it.text}</span>
                <StatusBadge status={it.status}/>
              </div>
            ))}
          </div>
          <div style={{marginTop:8,padding:"8px 12px",borderRadius:6,background:PERIOD_COLORS[openPeriod]+"0A",borderLeft:`3px solid ${PERIOD_COLORS[openPeriod]}66`,fontSize:11,color:T.t2,lineHeight:1.6}}>
            {d.summary}
          </div>
        </div>
      ))}
    </div>
  );
}

  const theme=useContext(ThemeCtx);const T=TH[theme];
  return(
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
      {[0,1,2].map(p=>(
        <div key={p} style={{borderRadius:8,border:`1px solid ${PERIOD_COLORS[p]}33`,overflow:"hidden"}}>
          <div style={{padding:"8px 10px",background:PERIOD_COLORS[p]+"18",borderBottom:`1px solid ${PERIOD_COLORS[p]}33`}}>
            <div style={{fontSize:12,fontWeight:700,color:PERIOD_COLORS[p]}}>{PERIOD_LABELS[p]}</div>
          </div>
          <div style={{padding:8,display:"flex",flexDirection:"column",gap:4}}>
            {data.filter(d=>d.period===p).flatMap(d=>d.items).map((it,i)=>(
              <div key={i} style={{padding:"6px 8px",borderRadius:6,background:T.rowBg,border:`1px solid ${T.border}`}}>
                <div style={{fontSize:12,fontWeight:600,color:T.text}}>{it.name}</div>
                <div style={{fontSize:10,color:T.t3,marginTop:2,lineHeight:1.5}}>{it.desc}</div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

function TechLayer({data,bfFilter}){
  const theme=useContext(ThemeCtx);const T=TH[theme];
  const filtered=bfFilter==="전체"?data:data.filter(d=>d.bf===bfFilter);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {filtered.map(group=>(
        <div key={group.bf}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <div style={{width:4,height:16,borderRadius:2,background:BF_COLORS[group.bf]}}/>
            <span style={{fontSize:13,fontWeight:700,color:BF_COLORS[group.bf]}}>기본기능 {group.bf}</span>
            <span style={{fontSize:12,color:T.t2}}>{group.label}</span>
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"separate",borderSpacing:0,fontSize:11}}>
              <thead>
                <tr>
                  <th style={{textAlign:"left",padding:"6px 8px",borderBottom:`2px solid ${T.border}`,color:T.t3,fontWeight:600,width:"18%",whiteSpace:"nowrap"}}>핵심기술</th>
                  {[0,1,2].map(p=>(
                    <th key={p} style={{textAlign:"left",padding:"6px 8px",borderBottom:`2px solid ${PERIOD_COLORS[p]}44`,color:PERIOD_COLORS[p],fontWeight:600,width:"27%"}}>{PERIOD_LABELS[p]}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {group.items.map((it,i)=>(
                  <tr key={it.id} style={{background:i%2===0?"transparent":T.hoverBg}}>
                    <td style={{padding:"5px 8px",borderBottom:`1px solid ${T.border}`,verticalAlign:"top"}}>
                      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:BF_COLORS[group.bf],fontWeight:600}}>{it.id}</span>
                      <span style={{marginLeft:4,color:T.text,fontWeight:500}}>{it.name}</span>
                    </td>
                    {[it.s,it.m,it.l].map((cell,ci)=>(
                      <td key={ci} style={{padding:"5px 8px",borderBottom:`1px solid ${T.border}`,color:cell?T.t2:T.t4,verticalAlign:"top",lineHeight:1.5}}>
                        {cell||"—"}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      ))}
    </div>
  );
}

function App(){
  const[theme,setTheme]=useState("dark");
  const[activeLayer,setActiveLayer]=useState(0);
  const[bfFilter,setBfFilter]=useState("전체");
  const T=TH[theme];

  const toggleTheme=useCallback(()=>{
    const n=theme==="dark"?"light":"dark";setTheme(n);document.body.className=n;
  },[theme]);

  const layers=[
    {label:"1층: Market Trends",sub:"시장 환경 및 니즈",icon:"📊"},
    {label:"2층: Products / Services",sub:"제품 및 서비스",icon:"📦"},
    {label:"3층: Core Technologies",sub:"핵심기술 (기술트리 연계)",icon:"⚙️"},
  ];

  const btnStyle=(active,c)=>({
    fontSize:11,padding:"4px 12px",borderRadius:6,cursor:"pointer",
    border:active?`1px solid ${c||"#60A5FA"}`:`1px solid ${T.border}`,
    background:active?`${c||"#60A5FA"}22`:"transparent",
    color:active?(c||"#60A5FA"):T.t2,fontWeight:active?600:400,
  });

  return(
    <ThemeCtx.Provider value={theme}>
      <div style={{minHeight:"100vh",background:T.bg,color:T.text,transition:"all .3s"}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"24px 16px"}}>
          {/* Header */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                <div style={{width:4,height:28,background:"linear-gradient(180deg,#2563EB,#059669)",borderRadius:2}}/>
                <h1 style={{fontSize:20,fontWeight:800,margin:0,letterSpacing:"-0.02em"}}>GAEMI 플랫폼 기술로드맵</h1>
              </div>
              <div style={{fontSize:12,color:T.t3,marginLeft:14,lineHeight:1.6}}>
                3층 구조 (Market Trends → Products/Services → Core Technologies) × 3시간축 (단기/중기/장기)
              </div>
              <div style={{fontSize:10,color:T.t4,marginLeft:14,marginTop:4}}>
                한양대학교 ERICA 기술경영 | Lecture 3 기술기획 기반 | 기술트리 39개 3차 노드 전체 배치
              </div>
            </div>
            <button onClick={toggleTheme} style={{
              fontSize:12,padding:"6px 14px",borderRadius:8,cursor:"pointer",
              border:`1px solid ${T.border}`,background:T.surface,color:T.t2,fontWeight:600,whiteSpace:"nowrap",
            }}>{theme==="dark"?"☀️ Light":"🌙 Dark"}</button>
          </div>

          {/* Status legend */}
          <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:16}}>
            <span style={{fontSize:10,color:T.t3,fontWeight:700}}>구분:</span>
            {Object.entries(STATUS_STYLE).map(([k,v])=>(
              <div key={k} style={{display:"flex",alignItems:"center",gap:4}}>
                <span style={{width:8,height:8,borderRadius:2,background:v.color}}/>
                <span style={{fontSize:10,color:T.t2}}>{k}</span>
              </div>
            ))}
          </div>

          {/* Layer tabs */}
          <div style={{display:"flex",gap:6,marginBottom:16}}>
            {layers.map((ly,i)=>(
              <button key={i} onClick={()=>setActiveLayer(i)} style={{
                flex:1,padding:"10px 8px",borderRadius:8,cursor:"pointer",textAlign:"center",
                border:activeLayer===i?`2px solid ${["#2563EB","#D97706","#059669"][i]}`:`1px solid ${T.border}`,
                background:activeLayer===i?`${["#2563EB","#D97706","#059669"][i]}12`:"transparent",
                color:activeLayer===i?["#2563EB","#D97706","#059669"][i]:T.t2,
              }}>
                <div style={{fontSize:14,marginBottom:2}}>{ly.icon}</div>
                <div style={{fontSize:12,fontWeight:activeLayer===i?700:500}}>{ly.label}</div>
                <div style={{fontSize:10,fontWeight:400,marginTop:2,opacity:.7}}>{ly.sub}</div>
              </button>
            ))}
          </div>

          {/* BF filter for layer 3 */}
          {activeLayer===2&&(
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12,flexWrap:"wrap"}}>
              <span style={{fontSize:11,color:T.t3,fontWeight:600}}>기본기능 필터:</span>
              <button onClick={()=>setBfFilter("전체")} style={btnStyle(bfFilter==="전체")}>전체</button>
              {Object.entries(BF_NAMES).map(([k,v])=>(
                <button key={k} onClick={()=>setBfFilter(k)} style={btnStyle(bfFilter===k,BF_COLORS[k])}>
                  {k}. {v}
                </button>
              ))}
            </div>
          )}

          {/* Content */}
          <div style={{background:T.surface,borderRadius:12,padding:16,border:`1px solid ${T.border}`,minHeight:300}}>
            {activeLayer===0&&<MarketLayer data={MARKET}/>}
            {activeLayer===1&&<ProductLayer data={PRODUCTS}/>}
            {activeLayer===2&&<TechLayer data={TECH} bfFilter={bfFilter}/>}
          </div>

          {/* Footer */}
          <div style={{marginTop:16,padding:"12px 14px",background:theme==="dark"?"#1E293B44":"#F1F5F9",borderRadius:8,border:`1px solid ${T.border}`}}>
            <div style={{fontSize:11,color:T.t3,lineHeight:1.6}}>
              <strong style={{color:T.t2}}>설계 원칙</strong> — Lecture 3: "미래 니즈에서 출발하여 필요한 핵심기술을 역으로 도출하는 전략 도구". Technologies 층의 모든 항목은 기술트리 확정본(69노드)의 3차 핵심기술에서 도출.
            </div>
            <div style={{fontSize:10,color:T.t4,marginTop:6}}>
              출처: 산업통상자원부 고시 제2023-211호, AI 규제합리화 로드맵(2025.11.27), ROSCon KR 2026(로봇신문), ROBOTIS 공식, Mordor Intelligence, 금감원 공시
            </div>
          </div>
        </div>
      </div>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
